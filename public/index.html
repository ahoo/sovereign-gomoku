<!DOCTYPE html>
<html lang="zh">
<head>
  <!-- version: v202606240811 -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>五子棋 Gomoku</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f5f5f0; }
    h1 { margin-bottom: 16px; color: #333; }
    #info { margin-bottom: 12px; font-size: 18px; font-weight: bold; color: #444; }
    canvas { border: 2px solid #888; background: #dcb468; cursor: pointer; }
    #controls { margin-top: 16px; display: flex; gap: 12px; }
    button {
      padding: 10px 24px; font-size: 16px; border-radius: 6px; border: none;
      cursor: pointer; background: #555; color: #fff; transition: background 0.2s;
    }
    button:hover { background: #333; }
  </style>
</head>
<body>
  <h1>五子棋</h1>
  <div id="info">黑方落子</div>
  <canvas id="board" width="570" height="570"></canvas>
  <div id="controls">
    <button id="restart-btn">重新开始</button>
    <button id="resign-btn" title="v202606240811">认输</button>
  </div>
  <div id="version" style="margin-top: 20px; font-size: 13px; color: #999;">v202606240811</div>

  <script>
    const BOARD_SIZE = 15;
    const CELL_SIZE = 38;
    const MARGIN = 20;
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const info = document.getElementById("info");
    const restartBtn = document.getElementById("restart-btn");
    const resignBtn = document.getElementById("resign-btn");

    let board = [];
    let currentPlayer = 1; // 1=黑 2=白
    let gameOver = false;

    function initBoard() {
      board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(0));
      currentPlayer = 1;
      gameOver = false;
      info.textContent = "黑方落子";
      drawBoard();
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "#8a6220";
      for (let i = 0; i < BOARD_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(MARGIN + i * CELL_SIZE, MARGIN);
        ctx.lineTo(MARGIN + i * CELL_SIZE, MARGIN + (BOARD_SIZE - 1) * CELL_SIZE);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(MARGIN, MARGIN + i * CELL_SIZE);
        ctx.lineTo(MARGIN + (BOARD_SIZE - 1) * CELL_SIZE, MARGIN + i * CELL_SIZE);
        ctx.stroke();
      }
      // Star points
      [3, 7, 11].forEach(r => [3, 7, 11].forEach(c => {
        ctx.beginPath();
        ctx.arc(MARGIN + c * CELL_SIZE, MARGIN + r * CELL_SIZE, 4, 0, Math.PI * 2);
        ctx.fillStyle = "#8a6220";
        ctx.fill();
      }));
      for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
          if (board[r][c]) drawStone(r, c, board[r][c]);
        }
      }
    }

    function drawStone(row, col, player) {
      const x = MARGIN + col * CELL_SIZE;
      const y = MARGIN + row * CELL_SIZE;
      const grad = ctx.createRadialGradient(x - 5, y - 5, 2, x, y, 16);
      if (player === 1) {
        grad.addColorStop(0, "#555"); grad.addColorStop(1, "#000");
      } else {
        grad.addColorStop(0, "#fff"); grad.addColorStop(1, "#aaa");
      }
      ctx.beginPath();
      ctx.arc(x, y, 16, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = player === 1 ? "#000" : "#888";
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function checkWin(row, col, player) {
      const dirs = [[0,1],[1,0],[1,1],[1,-1]];
      return dirs.some(([dr, dc]) => {
        let count = 1;
        for (let d of [1, -1]) {
          let r = row + dr*d, c = col + dc*d;
          while (r>=0 && r<BOARD_SIZE && c>=0 && c<BOARD_SIZE && board[r][c]===player) {
            count++; r+=dr*d; c+=dc*d;
          }
        }
        return count >= 5;
      });
    }

    canvas.addEventListener("click", (e) => {
      if (gameOver) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const col = Math.round((x - MARGIN) / CELL_SIZE);
      const row = Math.round((y - MARGIN) / CELL_SIZE);
      if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return;
      if (board[row][col] !== 0) return;
      board[row][col] = currentPlayer;
      drawBoard();
      if (checkWin(row, col, currentPlayer)) {
        gameOver = true;
        info.textContent = (currentPlayer === 1 ? "黑" : "白") + "方获胜！🎉";
        return;
      }
      currentPlayer = currentPlayer === 1 ? 2 : 1;
      info.textContent = (currentPlayer === 1 ? "黑" : "白") + "方落子";
    });

    restartBtn.addEventListener("click", initBoard);

    resignBtn.addEventListener("click", () => {
      if (gameOver) return;
      const playerName = currentPlayer === 1 ? "黑" : "白";
      if (!confirm(playerName + "方确定要认输吗？")) return;
      gameOver = true;
      const winner = currentPlayer === 1 ? 2 : 1;
      info.textContent = playerName + "方认输，" + (winner === 1 ? "黑" : "白") + "方获胜！🏳️";
      drawBoard();
    });

    initBoard();
  </script>
</body>
</html>
